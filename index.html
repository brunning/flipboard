<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Split-Flap Sign</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <h1 class="logo">
        <img src="img/logo.png" alt="Split-Flap Sign">
      </h1>
    </header>

    <form id="message-form" autocomplete="off">
      <div class="input-wrap">
        <input
          type="text"
          id="message-input"
          placeholder="Type a message..."
          spellcheck="false"
        >
        <button
          type="button"
          id="clear-input"
          class="clear-btn"
          aria-label="Clear input"
          hidden
        >&times;</button>
      </div>
      <button type="submit">Display</button>
    </form>

    <div id="sign" class="sign" aria-live="polite" aria-label="Split-flap sign"></div>

    <div class="export-row">
      <button type="button" id="export-button" class="secondary">Export GIF</button>
    </div>

    <form id="layout-form" class="layout-form" autocomplete="off">
      <label for="rows-input">Rows</label>
      <input type="number" id="rows-input" min="1" max="12" step="1" inputmode="numeric">
      <label for="cols-input">Cols</label>
      <input type="number" id="cols-input" min="1" max="40" step="1" inputmode="numeric">
      <button type="submit" class="secondary">Apply</button>
    </form>

    <div id="export-status" class="export-status" aria-live="polite"></div>

    <p class="hint">
      Allowed characters: <span class="chips">A&ndash;Z, 0&ndash;9, .,!?&apos;-:/&amp;</span>
      Each line holds <span id="hint-cols">16</span> characters across <span id="hint-rows">2</span> rows. Words wrap whole.
    </p>
  </main>

  <script src="vendor/gif.js"></script>
  <script src="app.js"></script>
  <script src="record.js"></script>
</body>
</html>
